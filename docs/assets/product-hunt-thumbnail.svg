  </g>
  <g transform="translate(800 465)">
    <rect x="0" y="0" width="250" height="150" fill="#f8f1e3" stroke="#b8a995" stroke-width="4"/>
    <text x="28" y="58" fill="#a9802d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">REVIEW</text>
