  <text x="150" y="305" fill="#fffaf0" font-family="Georgia, serif" font-size="72" font-weight="700">Industry Research</text>
  <text x="150" y="385" fill="#151412" font-family="Georgia, serif" font-size="72" font-weight="700">Framework</text>
